openapi: 3.0.3

info:
  title: Enat Bank Payment Gateway API
  version: 1.0.0
  description: |
    REST API for Enat Bank payment integrations.
    Covers Ethiopian Airlines ticket payment, Ride ET bill payment,
    Account-to-Account (A2A) transfer, and generic CBS transfer.

    **Base URL:** `http://<server-ip>:4001`

    **Channel header:** Every request body must include a `channel` field
    identifying the frontend service:
    - `IB` — Internet Banking
    - `MB` — Mobile Banking
    - `USSD` — USSD
    - `BO` — Back Office

servers:
  - url: http://10.1.12.35:4001
    description: Development server

tags:
  - name: Airline
    description: Ethiopian Airlines ticket payment (FlyGate integration)
  - name: Ride
    description: Ride ET bill payment
  - name: A2A
    description: Account-to-Account transfer
  - name: CBS
    description: Generic CBS CreateTransaction / reverse

# ─────────────────────────────────────────────────────────────────────────────
# PATHS
# ─────────────────────────────────────────────────────────────────────────────
paths:

  # ── AIRLINE ─────────────────────────────────────────────────────────────────

  /airline/validate:
    post:
      tags: [Airline]
      summary: Validate order ID
      description: |
        Queries FlyGate GetOrder to verify the order exists and retrieve
        customer name, amount, PNR, and currency.
        Must be called before `/airline/confirm`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [orderid]
              properties:
                orderid:
                  type: string
                  example: ABCDEF
                  description: FlyGate order ID (4–20 alphanumeric chars)
                channel:
                  $ref: '#/components/schemas/Channel'
            example:
              orderid: ABCDEF
              channel: IB
      responses:
        '200':
          description: Order found and valid
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      orderId:      { type: string, example: ABCDEF }
                      amount:       { type: number, example: 4500 }
                      customerName: { type: string, example: ABEBE KEBEDE }
                      pnr:          { type: string, example: ET1234 }
                      currency:     { type: string, example: ETB }
        '404':
          description: Order not found or expired
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500':
          description: Internal server error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /airline/confirm:
    post:
      tags: [Airline]
      summary: Confirm airline ticket payment
      description: |
        Full payment flow:
        1. Checks if order is already paid (returns 409 if so)
        2. Looks up pending order from local DB or re-validates with FlyGate
        3. Debits customer account via CBS CreateTransaction
        4. Confirms payment with FlyGate ConfirmOrder
        5. Writes FlygateTransactions + Transactions journal (DR + CR rows)

        If FlyGate confirm fails after CBS debit, CBS is automatically reversed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [orderid, beneficiaryAcno]
              properties:
                orderid:
                  type: string
                  example: ABCDEF
                beneficiaryAcno:
                  type: string
                  example: "0011230708313001"
                  description: Customer debit account number
                amount:
                  type: number
                  example: 4500
                  description: Falls back to amount from validate step if omitted
                currency:
                  type: string
                  example: ETB
                  default: ETB
                pnr:
                  type: string
                  example: ET1234
                customerName:
                  type: string
                  example: ABEBE KEBEDE
                remark:
                  type: string
                  example: Airline ticket payment
                channel:
                  $ref: '#/components/schemas/Channel'
            example:
              orderid: ABCDEF
              beneficiaryAcno: "0011230708313001"
              remark: Airline ticket payment
              channel: IB
      responses:
        '200':
          description: Payment successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:    { type: string, example: Success }
                  message:   { type: string, example: Successfully transferred }
                  reference: { type: string, example: 001ATAD22346A03I }
        '400':
          description: CBS or FlyGate error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: Invalid order ID — not found or expired
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '409':
          description: Order already paid
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:      { type: string, example: AlreadyPaid }
                  message:     { type: string }
                  reference:   { type: string, example: 001ATAD22346A03I }
                  paidAt:      { type: string, format: date-time }
                  amount:      { type: number }
                  traceNumber: { type: string }
        '500':
          description: Internal server error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /airline/refund:
    post:
      tags: [Airline]
      summary: Process airline ticket refund
      description: |
        Called by the airline system (not the customer UI).
        Reverses the CBS transaction and confirms the refund with FlyGate.

        **Authentication:** Basic Auth — `Authorization: Basic <base64(email:password)>`
        using the same credentials configured in `AIRLINE_USER` / `AIRLINE_PASS`.
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [orderId, ReferenceNumber, amount, currency]
              properties:
                shortCode:
                  type: string
                  example: "526341"
                orderId:
                  type: string
                  example: ABCDEF
                firstName:
                  type: string
                  example: ABEBE
                lastName:
                  type: string
                  example: KEBEDE
                amount:
                  type: number
                  example: 4500
                currency:
                  type: string
                  example: ETB
                ReferenceNumber:
                  type: string
                  example: 001ATAD22346A03I
                  description: CBS FCCREF from the original payment
                refundFOP:
                  type: string
                  example: CASH
                refundReferenceCode:
                  type: string
                  example: RFND-ET1234-001
                RefundAccountNumber:
                  type: string
                  description: Optional — defaults to configured offset account
            example:
              shortCode: "526341"
              orderId: ABCDEF
              firstName: ABEBE
              lastName: KEBEDE
              amount: 4500
              currency: ETB
              ReferenceNumber: 001ATAD22346A03I
              refundFOP: CASH
              refundReferenceCode: RFND-ET1234-001
      responses:
        '200':
          description: Refund accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ResponseCode:             { type: integer, example: 1 }
                  success:                  { type: string, example: Success }
                  ResponseCodeDescription:  { type: string, example: Successfully accepted Refund request }
        '400':
          description: CBS reversal failed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  # ── RIDE ─────────────────────────────────────────────────────────────────────

  /ride/query:
    post:
      tags: [Ride]
      summary: Verify Ride ET phone account
      description: |
        Checks if a phone number has an active Ride ET account.
        Creates a `RideTransaction` audit row on success.
        Returns `auditId` — must be passed back to `/ride/pay`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone]
              properties:
                phone:
                  type: string
                  example: "251911259134"
                  description: Full phone number with country code (251XXXXXXXXX)
                channel:
                  $ref: '#/components/schemas/Channel'
            example:
              phone: "251911259134"
              channel: IB
      responses:
        '200':
          description: Account is active
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:  { type: string, example: Success }
                  message: { type: string, example: Ride account is active }
                  data:
                    type: object
                    properties:
                      full_name: { type: string, example: meron getachew }
                      phone:     { type: string, example: "251911259134" }
                      status:    { type: string, example: active }
                  auditId: { type: integer, example: 28 }
        '401':
          description: Ride API authentication failed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: Phone number not found on Ride
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '422':
          description: Account exists but is not active
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500':
          description: Internal server error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /ride/pay:
    post:
      tags: [Ride]
      summary: Execute Ride ET payment
      description: |
        Full payment flow:
        1. CBS CreateTransaction (debit customer account)
        2. Ride ConfirmPayment

        Updates the `RideTransaction` row created by `/ride/query`.
        If Ride confirm fails after CBS debit, CBS is automatically reversed.

        **Note:** Call `/ride/query` first to get `auditId`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [auditId, phone, amount, drAcNo]
              properties:
                auditId:
                  type: integer
                  example: 28
                  description: From /ride/query response
                phone:
                  type: string
                  example: "251911259134"
                amount:
                  type: number
                  example: 300
                drAcNo:
                  type: string
                  example: "0011230708313001"
                  description: Customer debit account number
                remark:
                  type: string
                  example: Ride top-up
                billRefNo:
                  type: string
                  example: BR7654321
                  description: Auto-generated if omitted
                channel:
                  $ref: '#/components/schemas/Channel'
            example:
              auditId: 28
              phone: "251911259134"
              amount: 300
              drAcNo: "0011230708313001"
              remark: Ride top-up
              channel: IB
      responses:
        '200':
          description: Payment successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:            { type: string, example: Success }
                  message:           { type: string }
                  acknowledgementId: { type: string, example: 52eb32d3-83ed-4579-8e15-fed0c9d38f8f }
                  cbsRefNo:          { type: string, example: 001ATAD22346A047 }
                  billRefNo:         { type: string, example: BR1777450840359 }
                  auditId:           { type: integer, example: 28 }
        '400':
          description: CBS or Ride confirm failed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ErrorResponse'
                  - type: object
                    properties:
                      autoReversed:    { type: boolean }
                      autoReversalRef: { type: string }
        '500':
          description: Internal server error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /ride/transactions:
    get:
      tags: [Ride]
      summary: Query Ride transaction audit log
      parameters:
        - name: phone
          in: query
          schema: { type: string }
          description: Partial phone number filter
        - name: paymentStatus
          in: query
          schema: { type: integer, enum: [0, 1] }
          description: 1=success, 0=failed/pending
        - name: cbsStatus
          in: query
          schema: { type: integer, enum: [0, 1] }
        - name: from
          in: query
          schema: { type: string, format: date }
          example: "2026-04-01"
        - name: to
          in: query
          schema: { type: string, format: date }
          example: "2026-04-30"
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
      responses:
        '200':
          description: Paginated list of Ride transactions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'

  # ── A2A ──────────────────────────────────────────────────────────────────────

  /a2a/validate:
    post:
      tags: [A2A]
      summary: Validate credit account for A2A transfer
      description: |
        Queries CBS to verify the credit (destination) account.
        Checks that the account is not frozen and allows credits.
        The debit account is trusted (customer's own account) and not queried.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [drAcNo, crAcNo]
              properties:
                drAcNo:
                  type: string
                  example: "0011230708313001"
                  description: Debit account (customer's own — not validated)
                crAcNo:
                  type: string
                  example: "0011111015113001"
                  description: Credit account (destination — validated via CBS)
                channel:
                  $ref: '#/components/schemas/Channel'
            example:
              drAcNo: "0011230708313001"
              crAcNo: "0011111015113001"
              channel: IB
      responses:
        '200':
          description: Credit account is valid
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: Success }
                  dr:
                    type: object
                    properties:
                      acNo:     { type: string }
                      name:     { type: string, nullable: true }
                      status:   { type: string, example: NORM }
                      currency: { type: string, example: ETB }
                  cr:
                    type: object
                    properties:
                      acNo:     { type: string }
                      name:     { type: string, example: SURAFEL TADESSE GUDA }
                      status:   { type: string, example: NORM }
                      currency: { type: string, example: ETB }
        '400':
          description: CBS query failed or account not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '422':
          description: Account is frozen or does not allow credits
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /a2a/transfer:
    post:
      tags: [A2A]
      summary: Execute A2A transfer
      description: |
        Full A2A transfer flow:
        1. Validates credit account via CBS
        2. CBS CreateTransaction (debit → credit)
        3. Writes A2ATransfer audit + Transactions journal (DR + CR rows)

        If a post-CBS step fails, CBS is automatically reversed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [drAcNo, crAcNo, amount]
              properties:
                drAcNo:
                  type: string
                  example: "0011230708313001"
                crAcNo:
                  type: string
                  example: "0011111015113001"
                amount:
                  type: number
                  example: 500
                narrative:
                  type: string
                  example: Loan repayment
                currency:
                  type: string
                  example: ETB
                  default: ETB
                channel:
                  $ref: '#/components/schemas/Channel'
            example:
              drAcNo: "0011230708313001"
              crAcNo: "0011111015113001"
              amount: 500
              narrative: Loan repayment
              channel: IB
      responses:
        '200':
          description: Transfer successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:   { type: string, example: Success }
                  message:  { type: string }
                  cbsRefNo: { type: string, example: 001ATAD22346A04W }
                  dr:
                    type: object
                    properties:
                      acNo: { type: string }
                      name: { type: string, nullable: true }
                  cr:
                    type: object
                    properties:
                      acNo: { type: string }
                      name: { type: string }
                  amount:   { type: number }
                  currency: { type: string }
                  auditId:  { type: integer }
        '400':
          description: CBS transaction failed or account validation error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '422':
          description: Credit account frozen or does not allow credits
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500':
          description: Internal server error (CBS auto-reversal attempted)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /a2a/transfers:
    get:
      tags: [A2A]
      summary: Query A2A transfer audit log
      parameters:
        - name: drAcNo
          in: query
          schema: { type: string }
          description: Partial debit account filter
        - name: crAcNo
          in: query
          schema: { type: string }
          description: Partial credit account filter
        - name: status
          in: query
          schema: { type: integer, enum: [0, 1] }
          description: 1=success, 0=failed
        - name: from
          in: query
          schema: { type: string, format: date }
        - name: to
          in: query
          schema: { type: string, format: date }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
      responses:
        '200':
          description: Paginated list of A2A transfers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'

  # ── CBS GENERIC ───────────────────────────────────────────────────────────────

  /cbs/transfer:
    post:
      tags: [CBS]
      summary: Generic CBS CreateTransaction
      description: |
        Execute a CBS CreateTransaction for any channel (Telebirr, Bill, M-Pesa, etc.).
        Branch codes are auto-derived from account numbers.
        Credit account defaults to the channel's configured settlement account if omitted.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [channel, prd, drAcNo, amount]
              properties:
                channel:
                  type: string
                  enum: [TELEBIRR, AIRLINE, BILL, MPESA, IPS, OTHER]
                  example: TELEBIRR
                  description: CBS channel — determines PRD and settlement account
                prd:
                  type: string
                  example: TBTT
                  description: CBS product code (ATAD, TBTT, BILL, MPSA, ATAS…)
                drAcNo:
                  type: string
                  example: "0011230708313001"
                crAcNo:
                  type: string
                  example: "0461112216017001"
                  description: Defaults to channel settlement account if omitted
                amount:
                  type: number
                  example: 500
                currency:
                  type: string
                  example: ETB
                  default: ETB
                narrative:
                  type: string
                  example: Telebirr top-up
                referenceId:
                  type: string
                  example: "0911234567"
                  description: Caller's own reference (phone, bill no, PNR…)
            example:
              channel: TELEBIRR
              prd: TBTT
              drAcNo: "0011230708313001"
              crAcNo: "0461112216017001"
              amount: 500
              narrative: Telebirr top-up
              referenceId: "0911234567"
      responses:
        '200':
          description: CBS transaction successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:   { type: string, example: Success }
                  message:  { type: string }
                  cbsRefNo: { type: string, example: 001TBTT22346A001 }
                  auditId:  { type: integer }
        '400':
          description: CBS transaction failed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ErrorResponse'
                  - type: object
                    properties:
                      errorCode: { type: string, example: DE-TUD-055 }
        '500':
          description: Internal server error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /cbs/reverse:
    post:
      tags: [CBS]
      summary: Reverse a CBS transaction
      description: Reverses a previous CBS transaction by its FCCREF.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cbsRefNo]
              properties:
                cbsRefNo:
                  type: string
                  example: 001ATAD22346A03I
                  description: CBS FCCREF from the original transaction
            example:
              cbsRefNo: 001ATAD22346A03I
      responses:
        '200':
          description: Reversal successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:   { type: string, example: Success }
                  message:  { type: string }
                  cbsRefNo: { type: string }
        '400':
          description: Reversal failed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /cbs/transfers:
    get:
      tags: [CBS]
      summary: Query CBS transfer audit log
      parameters:
        - name: channel
          in: query
          schema: { type: string }
          example: TELEBIRR
        - name: referenceId
          in: query
          schema: { type: string }
          description: Partial match
        - name: status
          in: query
          schema: { type: integer, enum: [0, 1] }
        - name: from
          in: query
          schema: { type: string, format: date }
        - name: to
          in: query
          schema: { type: string, format: date }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
      responses:
        '200':
          description: Paginated list of CBS transfers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'

# ─────────────────────────────────────────────────────────────────────────────
# COMPONENTS
# ─────────────────────────────────────────────────────────────────────────────
components:

  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: Used only for /airline/refund — credentials from AIRLINE_USER/AIRLINE_PASS

  schemas:

    Channel:
      type: string
      enum: [IB, MB, USSD, BO]
      example: IB
      description: |
        Frontend channel identifier — stored in Transactions table only, never sent to CBS.
        - IB: Internet Banking
        - MB: Mobile Banking
        - USSD: USSD
        - BO: Back Office

    ErrorResponse:
      type: object
      properties:
        status:
          type: string
          example: Error
        message:
          type: string
          example: Invalid GL or Account Number.
        errorCode:
          type: string
          nullable: true
          example: DE-TUD-055

    PaginatedResponse:
      type: object
      properties:
        status:
          type: string
          example: Success
        total:
          type: integer
          example: 150
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        data:
          type: array
          items:
            type: object
